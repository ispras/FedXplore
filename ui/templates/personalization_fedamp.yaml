name: Personalization FedAMP
description: Verified FedAMP setup using the current `federated_method/fedamp.yaml` config.
form:
  run_name: personalization_fedamp
  random_state: 41
  communication_rounds: 20
  dataset: cifar10
  trust_dataset: ""
  distribution: uniform
  distribution_alpha: 0.1
  amount_of_clients: 10
  client_subset_size: 10
  training_batch_size: 32
  manager_batch_size: 5
  device_mode: gpu
  device_ids: "[0]"
  print_client_metrics: false
  federated_method: fedamp
  client_selector: uniform
  logger: base
  model: resnet18
  model_trainer: image
  optimizer: sgd
overrides:
  - federated_method.strategy=base
  - federated_method.proximity=0.2
  - federated_method.scaling=0.5
  - federated_method.self_value=0.15
