name: Dirichlet FedCor
description: Heterogeneous CIFAR-10 run based on the README example with `distribution.alpha=0.1` and `client_selector=fedcor`.
form:
  run_name: dirichlet_fedcor
  random_state: 41
  communication_rounds: 200
  dataset: cifar10
  trust_dataset: ""
  distribution: dirichlet
  distribution_alpha: 0.1
  amount_of_clients: 100
  client_subset_size: 5
  training_batch_size: 32
  manager_batch_size: 10
  device_mode: gpu
  device_ids: "[0]"
  print_client_metrics: false
  federated_method: fedavg
  client_selector: fedcor
  logger: base
  model: resnet18
  model_trainer: image
  optimizer: adam
